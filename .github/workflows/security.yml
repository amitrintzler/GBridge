name: Security

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Upgrade pip itself so the audit doesn't flag the runner's bundled pip
        # (CVE-2026-3219 / -6357 were fixed in pip 26.1).
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit

      - name: Audit dependencies for known vulnerabilities
        # --skip-editable: the local editable `gbridge` install is our own code,
        # not on PyPI, so it can't be audited. We drop --strict because, with
        # an editable install present, --strict treats that un-auditable
        # package as a hard error. pip-audit still exits non-zero on any real
        # CVE in third-party deps.
        run: pip-audit --desc --skip-editable

  static-analysis:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scanner
        run: bandit -r src/gbridge/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Display results
        if: always()
        run: bandit -r src/gbridge/ -c pyproject.toml -ll

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment -o sbom.json --output-format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
